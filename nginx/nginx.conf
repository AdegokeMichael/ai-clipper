# ─────────────────────────────────────────────────────────────────────────────
#  nginx/nginx.conf — AI Clipper reverse proxy
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

# Increase open file limit to handle concurrent video streaming connections
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;           # Linux-optimised event model
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Hide server identity ───────────────────────────────────────────────────
    server_tokens off;    # Removes "nginx/1.x.x" from headers and error pages

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;    # Batch TCP packets for sendfile
    tcp_nodelay         on;    # Disable Nagle for keep-alive connections
    keepalive_timeout   75s;
    keepalive_requests  1000;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types
        text/plain text/css
        application/json application/javascript
        text/xml application/xml text/javascript
        image/svg+xml application/manifest+json;

    # ── Client body limits ────────────────────────────────────────────────────
    # Allow large video uploads (up to 2 GB)
    client_max_body_size    2048M;
    client_body_timeout     300s;
    client_header_timeout   30s;
    send_timeout            300s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Protects the API from abuse; raise burst as needed for legitimate bursts.
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Security headers (applied globally) ───────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    # Uncomment after confirming HTTPS works (HSTS cannot be undone easily):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upstream: FastAPI app container ───────────────────────────────────────
    upstream autoposter {
        server autoposter:8000;
        keepalive 32;
        keepalive_requests 1000;
        keepalive_timeout  75s;
    }

    # ── HTTP server ───────────────────────────────────────────────────────────
    server {
        listen 80;

        # Replace with your actual domain. Once you have a domain,
        # add the HTTPS block below and redirect HTTP → HTTPS.
        server_name _;

        # Timeouts for long video uploads and AI processing
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
        proxy_connect_timeout  60s;

        # ── Health check endpoint (excluded from rate limiting) ──────────────
        location = /health {
            proxy_pass         http://autoposter;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            access_log         off;    # Don't pollute access logs with probe noise
        }

        # ── Serve clip videos directly (faster than routing through Python) ──
        # Maps GET /clips/<ID>/video → /var/www/clips/<ID>.mp4
        location ~* ^/clips/([^/]+)/video$ {
            alias /var/www/clips/;
            try_files /$1.mp4 @proxy;
            add_header Accept-Ranges  bytes;
            add_header Cache-Control  "public, max-age=3600";
            limit_conn addr 10;        # Max 10 concurrent video streams per IP
        }

        # ── Upload endpoint (tighter rate limit for large bodies) ─────────────
        location ~* ^/(upload|process) {
            limit_req   zone=upload burst=5 nodelay;
            limit_conn  addr 3;

            proxy_pass         http://autoposter;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_request_buffering off;    # Stream the upload body directly to the app
        }

        # ── All other requests → FastAPI app ─────────────────────────────────
        location / {
            limit_req  zone=api burst=20 nodelay;
            limit_conn addr 20;

            proxy_pass         http://autoposter;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
        }

        # ── Fallback: route to proxy if static file not found ─────────────────
        location @proxy {
            proxy_pass       http://autoposter;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    # 1. Get a cert:   sudo certbot certonly --standalone -d yourdomain.com
    # 2. Uncomment this block and replace yourdomain.com
    # 3. Uncomment the HSTS header above after confirming HTTPS works
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     # Modern TLS — drops IE11 and very old Android support
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # Session resumption — reduces TLS handshake cost
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     # OCSP stapling — speeds up certificate validation for clients
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #     resolver            1.1.1.1 8.8.8.8 valid=300s;
    #     resolver_timeout    5s;
    #
    #     client_max_body_size  2048M;
    #     proxy_read_timeout    900s;
    #     proxy_send_timeout    900s;
    #     proxy_connect_timeout  60s;
    #
    #     location = /health {
    #         proxy_pass http://autoposter;
    #         access_log off;
    #     }
    #
    #     location / {
    #         limit_req  zone=api burst=20 nodelay;
    #         proxy_pass         http://autoposter;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade           $http_upgrade;
    #         proxy_set_header   Connection        "upgrade";
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto https;
    #         proxy_buffering    off;
    #     }
    # }
    #
    # ── HTTP → HTTPS redirect (enable alongside the HTTPS block above) ────────
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
